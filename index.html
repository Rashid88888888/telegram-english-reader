<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reels English Reader</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #222;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
    }

    .box {
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 18px;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 14px;
      font-size: 18px;
      box-sizing: border-box;
      resize: vertical;
    }

    .buttons {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 16px 22px;
      font-size: 18px;
      cursor: pointer;
      color: #fff;
    }

    .blue {
      background: #3b82f6;
    }

    .green {
      background: #22c55e;
    }

    .reader {
      font-size: 22px;
      line-height: 1.9;
      word-break: break-word;
    }

    .word {
      cursor: pointer;
      padding: 2px 3px;
      border-radius: 6px;
    }

    .word.active {
      background: #dbeafe;
    }

    .info {
      background: #eaf2fb;
      border-radius: 16px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.7;
    }

    .value {
      font-weight: bold;
    }

    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 999;
      padding: 16px;
    }

    .popup-overlay.show {
      display: flex;
    }

    .popup {
      width: 100%;
      max-width: 520px;
      background: white;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.18);
    }

    .popup-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .popup-line {
      margin-bottom: 12px;
      font-size: 18px;
      line-height: 1.6;
    }

    .popup-label {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .popup-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .small-btn {
      flex: 1;
      min-width: 140px;
    }

    .status {
      color: #6b7280;
      font-size: 15px;
      margin-top: 10px;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      h1 {
        font-size: 24px;
      }

      .reader {
        font-size: 19px;
      }

      button {
        width: 100%;
      }

      .small-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Reels English Reader</h1>

    <div class="box">
      <textarea id="sourceText" placeholder="Вставь сюда английский текст"></textarea>

      <div class="buttons">
        <button class="blue" id="showBtn">Показать текст</button>
        <button class="green" id="saveBtn">Сохранить слово в бота</button>
      </div>
    </div>

    <div class="box">
      <div id="reader" class="reader"></div>
    </div>

    <div class="info">
      <div>Выбрано слово: <span class="value" id="selectedWord">—</span></div>
      <div>Перевод: <span class="value" id="selectedTranslation">—</span></div>
      <div class="status" id="statusText">Нажми на слово в тексте.</div>
    </div>
  </div>

  <div class="popup-overlay" id="popupOverlay">
    <div class="popup">
      <div class="popup-title">Перевод слова</div>

      <div class="popup-line">
        <div class="popup-label">Слово</div>
        <div id="popupWord"><b>—</b></div>
      </div>

      <div class="popup-line">
        <div class="popup-label">Перевод на русский</div>
        <div id="popupTranslation"><b>—</b></div>
      </div>

      <div class="status" id="popupStatus">Ждём выбор слова...</div>

      <div class="popup-buttons">
        <button class="green small-btn" id="popupSaveBtn">Сохранить в бота</button>
        <button class="blue small-btn" id="closePopupBtn">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const sourceText = document.getElementById("sourceText");
    const reader = document.getElementById("reader");
    const showBtn = document.getElementById("showBtn");
    const saveBtn = document.getElementById("saveBtn");

    const selectedWord = document.getElementById("selectedWord");
    const selectedTranslation = document.getElementById("selectedTranslation");
    const statusText = document.getElementById("statusText");

    const popupOverlay = document.getElementById("popupOverlay");
    const popupWord = document.getElementById("popupWord");
    const popupTranslation = document.getElementById("popupTranslation");
    const popupStatus = document.getElementById("popupStatus");
    const popupSaveBtn = document.getElementById("popupSaveBtn");
    const closePopupBtn = document.getElementById("closePopupBtn");

    let currentWord = "";
    let currentTranslation = "";

    const fallbackDictionary = {
      should: "следует; должен",
      person: "человек",
      people: "люди",
      strongest: "самый сильный",
      father: "отец",
      funeral: "похороны",
      right: "правильно; верно",
      well: "ну; хорошо",
      something: "что-то",
      aim: "цель",
      because: "потому что",
      transition: "переход",
      generational: "поколенческий",
      means: "означает",
      around: "вокруг",
      suffering: "страдание",
      loss: "потеря",
      someone: "кто-то",
      turn: "обратиться",
      illustrate: "показывать; иллюстрировать",
      proper: "правильный",
      behavior: "поведение",
      force: "сила",
      character: "характер",
      sufficient: "достаточный",
      move: "двигать; сдвинуть",
      beyond: "за пределами",
      catastrophe: "катастрофа",
      need: "нуждаться",
      great: "великий; отличный",
      thing: "вещь",
      hypothesize: "предполагать"
    };

    function normalizeWord(word) {
      return word
        .toLowerCase()
        .replace(/[.,!?;:()"“”'`’]/g, "")
        .trim();
    }

    function openPopup() {
      popupOverlay.classList.add("show");
    }

    function closePopup() {
      popupOverlay.classList.remove("show");
    }

    function setLoadingState(word) {
      selectedWord.textContent = word || "—";
      selectedTranslation.textContent = "загружается...";
      statusText.textContent = "Перевожу слово...";

      popupWord.innerHTML = "<b>" + word + "</b>";
      popupTranslation.innerHTML = "<b>загружается...</b>";
      popupStatus.textContent = "Идёт запрос на перевод...";
    }

    function setTranslationResult(word, translation) {
      selectedWord.textContent = word || "—";
      selectedTranslation.textContent = translation || "—";
      statusText.textContent = "Перевод получен.";

      popupWord.innerHTML = "<b>" + word + "</b>";
      popupTranslation.innerHTML = "<b>" + translation + "</b>";
      popupStatus.textContent = "Готово.";
    }

    function setTranslationError(word, fallbackText) {
      selectedWord.textContent = word || "—";
      selectedTranslation.textContent = fallbackText;
      statusText.textContent = "Показан запасной перевод.";

      popupWord.innerHTML = "<b>" + word + "</b>";
      popupTranslation.innerHTML = "<b>" + fallbackText + "</b>";
      popupStatus.textContent = "Основной переводчик не ответил, показан fallback.";
    }

    async function translateWord(word) {
      const clean = normalizeWord(word);

      if (!clean) {
        return "—";
      }

      try {
        const url =
          "https://api.mymemory.translated.net/get?q=" +
          encodeURIComponent(clean) +
          "&langpair=en|ru";

        const response = await fetch(url);
        const data = await response.json();

        const translatedText = data?.responseData?.translatedText?.trim();

        if (translatedText && translatedText.toLowerCase() !== clean.toLowerCase()) {
          return translatedText;
        }

        if (fallbackDictionary[clean]) {
          return fallbackDictionary[clean];
        }

        return "перевод не найден";
      } catch (error) {
        if (fallbackDictionary[clean]) {
          return fallbackDictionary[clean];
        }

        return "ошибка перевода";
      }
    }

    function renderText() {
      const text = sourceText.value.trim();

      if (!text) {
        reader.innerHTML = "Сначала вставь текст.";
        return;
      }

      const parts = text.match(/[A-Za-z'-]+|[^A-Za-z'-]+/g) || [];

      reader.innerHTML = parts.map(part => {
        if (/^[A-Za-z'-]+$/.test(part)) {
          return `<span class="word" data-word="${part}">${part}</span>`;
        }
        return part;
      }).join("");

      document.querySelectorAll(".word").forEach(el => {
        el.addEventListener("click", async () => {
          document.querySelectorAll(".word").forEach(w => w.classList.remove("active"));
          el.classList.add("active");

          currentWord = normalizeWord(el.dataset.word);
          currentTranslation = "";

          openPopup();
          setLoadingState(currentWord);

          const translated = await translateWord(currentWord);
          currentTranslation = translated;

          if (
            translated === "ошибка перевода" ||
            translated === "перевод не найден" ||
            translated === fallbackDictionary[currentWord]
          ) {
            setTranslationError(currentWord, translated);
          } else {
            setTranslationResult(currentWord, translated);
          }
        });
      });
    }

    function saveWordToBot() {
      if (!currentWord) {
        alert("Сначала выбери слово.");
        return;
      }

      const payload = {
        type: "save_word",
        word: currentWord,
        translation: currentTranslation || ""
      };

      if (tg) {
        tg.sendData(JSON.stringify(payload));
      } else {
        alert("Telegram Mini App не найден");
      }
    }

    showBtn.addEventListener("click", renderText);
    saveBtn.addEventListener("click", saveWordToBot);
    popupSaveBtn.addEventListener("click", saveWordToBot);
    closePopupBtn.addEventListener("click", closePopup);

    popupOverlay.addEventListener("click", (e) => {
      if (e.target === popupOverlay) {
        closePopup();
      }
    });

    sourceText.value = `You should be the strongest person at your father's funeral, right? Well, that's something to aim for, because it's a transition, a generational transition, and it means that all the people around you are suffering because of their loss. They have someone to turn to who can illustrate proper behavior that the force of character is sufficient to move you beyond the catastrophe. And you need that. And that's a great thing to hypothesize as your aim.`;

    renderText();
  </script>
</body>
</html>
