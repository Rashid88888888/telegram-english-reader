<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>English Reader</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      padding: 18px;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #222;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 18px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      margin-bottom: 16px;
      border: 1px solid #e5e7eb;
    }

    .label {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 8px;
      font-weight: bold;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      padding: 14px;
      font-size: 18px;
      box-sizing: border-box;
      resize: vertical;
      outline: none;
    }

    textarea:focus {
      border-color: #3b82f6;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      color: white;
    }

    .blue {
      background: #3b82f6;
    }

    .green {
      background: #22c55e;
    }

    .purple {
      background: #8b5cf6;
    }

    .gray {
      background: #6b7280;
    }

    .reader {
      font-size: 22px;
      line-height: 1.9;
      user-select: text;
      -webkit-user-select: text;
      word-break: break-word;
    }

    .word {
      cursor: pointer;
      padding: 2px 3px;
      border-radius: 6px;
    }

    .word:hover {
      background: #e0ecff;
    }

    .word.active {
      background: #dbeafe;
    }

    .info {
      background: #eaf2fb;
      border-radius: 16px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.7;
    }

    .value {
      font-weight: bold;
    }

    .small {
      font-size: 14px;
      color: #6b7280;
      margin-top: 8px;
      line-height: 1.5;
    }

    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 999;
      padding: 14px;
    }

    .popup-overlay.show {
      display: flex;
    }

    .popup {
      width: 100%;
      max-width: 560px;
      background: white;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .popup-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .popup-block {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .popup-label {
      font-size: 13px;
      color: #6b7280;
      text-transform: uppercase;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .popup-value {
      font-size: 20px;
      line-height: 1.5;
      word-break: break-word;
    }

    .popup-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .popup-buttons button {
      flex: 1 1 180px;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      h1 {
        font-size: 24px;
      }

      .reader {
        font-size: 19px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>English Reader</h1>

    <div class="card">
      <div class="label">Вставь английский текст</div>
      <textarea id="sourceText" placeholder="Вставь сюда транскрибацию или любой английский текст"></textarea>

      <div class="buttons">
        <button class="blue" id="showBtn">Показать текст</button>
        <button class="purple" id="translateSelectionBtn">Перевести выделенное</button>
        <button class="green" id="saveBtn">Сохранить в бота</button>
      </div>

      <div class="small">
        Быстрый режим: нажми на одно слово.<br>
        Режим фразы: выдели несколько слов пальцем и нажми «Перевести выделенное».
      </div>
    </div>

    <div class="card">
      <div class="label">Текст для чтения</div>
      <div id="reader" class="reader"></div>
    </div>

    <div class="info">
      <div>Выбрано: <span class="value" id="selectedText">—</span></div>
      <div>Перевод: <span class="value" id="selectedTranslation">—</span></div>
      <div class="small" id="statusText">Нажми на слово или выдели фразу.</div>
    </div>
  </div>

  <div class="popup-overlay" id="popupOverlay">
    <div class="popup">
      <div class="popup-title">Перевод</div>

      <div class="popup-block">
        <div class="popup-label">Оригинал</div>
        <div class="popup-value" id="popupOriginal">—</div>
      </div>

      <div class="popup-block">
        <div class="popup-label">Перевод на русский</div>
        <div class="popup-value" id="popupTranslated">—</div>
      </div>

      <div class="small" id="popupStatus">Ожидание выбора текста…</div>

      <div class="popup-buttons">
        <button class="green" id="popupSaveBtn">Сохранить в бота</button>
        <button class="gray" id="closePopupBtn">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const sourceText = document.getElementById("sourceText");
    const reader = document.getElementById("reader");
    const showBtn = document.getElementById("showBtn");
    const saveBtn = document.getElementById("saveBtn");
    const translateSelectionBtn = document.getElementById("translateSelectionBtn");

    const selectedTextEl = document.getElementById("selectedText");
    const selectedTranslationEl = document.getElementById("selectedTranslation");
    const statusText = document.getElementById("statusText");

    const popupOverlay = document.getElementById("popupOverlay");
    const popupOriginal = document.getElementById("popupOriginal");
    const popupTranslated = document.getElementById("popupTranslated");
    const popupStatus = document.getElementById("popupStatus");
    const popupSaveBtn = document.getElementById("popupSaveBtn");
    const closePopupBtn = document.getElementById("closePopupBtn");

    let currentSelectedText = "";
    let currentTranslation = "";

    const fallbackDictionary = {
      should: "следует; должен",
      strongest: "самый сильный",
      person: "человек",
      people: "люди",
      father: "отец",
      funeral: "похороны",
      right: "правильно; верно",
      something: "что-то",
      aim: "цель",
      because: "потому что",
      transition: "переход",
      generational: "поколенческий",
      means: "означает",
      around: "вокруг",
      suffering: "страдание",
      loss: "потеря",
      someone: "кто-то",
      turn: "обратиться",
      illustrate: "показывать; иллюстрировать",
      proper: "правильный",
      behavior: "поведение",
      force: "сила",
      character: "характер",
      sufficient: "достаточный",
      move: "двигать; сдвинуть",
      beyond: "за пределами",
      catastrophe: "катастрофа",
      need: "нуждаться",
      great: "великий; отличный",
      thing: "вещь",
      hypothesize: "предполагать"
    };

    function normalizeText(text) {
      return text.replace(/\s+/g, " ").trim();
    }

    function normalizeWord(word) {
      return word
        .toLowerCase()
        .replace(/[.,!?;:()"“”'`’]/g, "")
        .trim();
    }

    function openPopup() {
      popupOverlay.classList.add("show");
    }

    function closePopup() {
      popupOverlay.classList.remove("show");
    }

    function setLoading(originalText) {
      selectedTextEl.textContent = originalText || "—";
      selectedTranslationEl.textContent = "загружается...";
      statusText.textContent = "Переводим...";

      popupOriginal.textContent = originalText || "—";
      popupTranslated.textContent = "загружается...";
      popupStatus.textContent = "Идёт запрос на перевод...";
    }

    function setResult(originalText, translatedText) {
      selectedTextEl.textContent = originalText || "—";
      selectedTranslationEl.textContent = translatedText || "—";
      statusText.textContent = "Перевод готов.";

      popupOriginal.textContent = originalText || "—";
      popupTranslated.textContent = translatedText || "—";
      popupStatus.textContent = "Готово.";
    }

    async function translateText(text) {
      const clean = normalizeText(text);
      if (!clean) return "—";

      try {
        const url =
          "https://api.mymemory.translated.net/get?q=" +
          encodeURIComponent(clean) +
          "&langpair=en|ru";

        const response = await fetch(url);
        const data = await response.json();
        const translatedText = data?.responseData?.translatedText?.trim();

        if (translatedText) {
          return translatedText;
        }

        if (!clean.includes(" ")) {
          const oneWord = normalizeWord(clean);
          if (fallbackDictionary[oneWord]) return fallbackDictionary[oneWord];
        }

        return "перевод не найден";
      } catch (error) {
        if (!clean.includes(" ")) {
          const oneWord = normalizeWord(clean);
          if (fallbackDictionary[oneWord]) return fallbackDictionary[oneWord];
        }

        return "ошибка перевода";
      }
    }

    function renderText() {
      const text = sourceText.value.trim();

      if (!text) {
        reader.innerHTML = "Сначала вставь текст.";
        return;
      }

      const parts = text.match(/[A-Za-z'-]+|[^A-Za-z'-]+/g) || [];

      reader.innerHTML = parts.map(part => {
        if (/^[A-Za-z'-]+$/.test(part)) {
          return `<span class="word" data-word="${part}">${part}</span>`;
        }
        return part;
      }).join("");

      document.querySelectorAll(".word").forEach(el => {
        el.addEventListener("click", async () => {
          const selectedByMouse = normalizeText(window.getSelection().toString());

          if (selectedByMouse.length > 1) {
            return;
          }

          document.querySelectorAll(".word").forEach(w => w.classList.remove("active"));
          el.classList.add("active");

          currentSelectedText = normalizeWord(el.dataset.word);
          currentTranslation = "";

          openPopup();
          setLoading(currentSelectedText);

          const translated = await translateText(currentSelectedText);
          currentTranslation = translated;

          setResult(currentSelectedText, translated);
        });
      });
    }

    async function translateSelectedPhrase() {
      const selected = normalizeText(window.getSelection().toString());

      if (!selected) {
        alert("Сначала выдели несколько слов в тексте.");
        return;
      }

      currentSelectedText = selected;
      currentTranslation = "";

      document.querySelectorAll(".word").forEach(w => w.classList.remove("active"));

      openPopup();
      setLoading(currentSelectedText);

      const translated = await translateText(currentSelectedText);
      currentTranslation = translated;

      setResult(currentSelectedText, translated);
    }

    function saveToBot() {
      if (!currentSelectedText) {
        alert("Сначала выбери слово или выдели фразу.");
        return;
      }

      const payload = {
        type: "save_translation",
        original: currentSelectedText,
        translation: currentTranslation
      };

      if (tg) {
        tg.sendData(JSON.stringify(payload));
      } else {
        alert("Telegram Mini App не найден");
      }
    }

    showBtn.addEventListener("click", renderText);
    translateSelectionBtn.addEventListener("click", translateSelectedPhrase);
    saveBtn.addEventListener("click", saveToBot);
    popupSaveBtn.addEventListener("click", saveToBot);
    closePopupBtn.addEventListener("click", closePopup);

    popupOverlay.addEventListener("click", (e) => {
      if (e.target === popupOverlay) {
        closePopup();
      }
    });

    sourceText.value = `You should be the strongest person at your father's funeral, right? Well, that's something to aim for, because it's a transition, a generational transition, and it means that all the people around you are suffering because of their loss. They have someone to turn to who can illustrate proper behavior that the force of character is sufficient to move you beyond the catastrophe. And you need that. And that's a great thing to hypothesize as your aim.`;

    renderText();
  </script>
</body>
</html>
